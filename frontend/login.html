<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background:#eef2ff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:system-ui, sans-serif;
    }
    .container {
      background:#fff;
      padding:30px;
      border-radius:12px;
      box-shadow:0 6px 20px rgba(0,0,0,0.1);
      width:320px;
      text-align:center;
    }
    h2 { color:#1e3a8a; margin-bottom:10px; }
    p { color:#374151; font-size:0.9rem; margin-bottom:15px; }
    input, button {
      width:100%;
      padding:10px;
      margin:6px 0;
      border-radius:6px;
      border:1px solid #d1d5db;
      font-size:0.95rem;
    }
    button {
      background:#2563eb;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:600;
    }
    button:hover { opacity:0.9; }
    .alert { display:none; padding:8px; border-radius:6px; margin-top:10px; font-size:0.9rem; }
    .alert-error { background:#fee2e2; color:#991b1b; }
    a { color:#2563eb; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Welcome Back</h2>
    <p>Sign in to manage your library account</p>

    <form id="login-form">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div id="login-error" class="alert alert-error"></div>

    <p>New here? <a href="register.html">Create an account</a></p>
  </div>

  <script>
    const API_BASE_URL = "http://localhost:8080";

    async function apiRequest(path, options={}) {
      const res = await fetch(API_BASE_URL + path, {
        headers: {"Content-Type":"application/json"},
        ...options
      });
      let data = null;
      try { data = await res.json(); } catch(e){}
      if(!res.ok) throw new Error(data?.message || "Request failed");
      return data;
    }

    document.getElementById("login-form").addEventListener("submit", async function(e){
      e.preventDefault();
      const form = e.target;
      const email = form.email.value.trim();
      const password = form.password.value;

      const errorBox = document.getElementById("login-error");
      errorBox.style.display="none";

      try {
        const user = await apiRequest("/api/auth/login", {
          method:"POST",
          body: JSON.stringify({email,password})
        });
        localStorage.setItem("lms_user", JSON.stringify(user));
        window.location.href = "dashboard.html";
      } catch(err){
        errorBox.innerText = err.message || "Login failed ❌";
        errorBox.style.display="block";
      }
    });
  </script>
</body>
</html>

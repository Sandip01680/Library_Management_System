<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library | Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background:#eef2ff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:system-ui, sans-serif;
    }
    .container {
      background:#fff;
      padding:30px;
      border-radius:12px;
      box-shadow:0 6px 20px rgba(0,0,0,0.1);
      width:320px;
      text-align:center;
    }
    h2 { color:#1e3a8a; margin-bottom:10px; }
    p { color:#374151; font-size:0.9rem; margin-bottom:15px; }
    input, select, button {
      width:100%;
      padding:10px;
      margin:6px 0;
      border-radius:6px;
      border:1px solid #d1d5db;
      font-size:0.95rem;
    }
    button {
      background:#2563eb;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:600;
    }
    button:hover { opacity:0.9; }
    .alert {
      display:none;
      padding:8px;
      border-radius:6px;
      margin-top:10px;
      font-size:0.9rem;
    }
    .alert-success { background:#dcfce7; color:#166534; }
    .alert-error { background:#fee2e2; color:#991b1b; }
    a { color:#2563eb; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create an account</h2>
    <p>Sign up to start managing books and transactions.</p>

    <form id="register-form">
      <input type="text" name="name" placeholder="Full name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <select name="role">
        <option value="">Member</option>
        <option value="ADMIN">Admin</option>
      </select>
      <button type="submit">Register</button>
    </form>

    <div id="register-error" class="alert alert-error"></div>
    <div id="register-success" class="alert alert-success"></div>

    <p>Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script>
    const API_BASE_URL = "http://localhost:8080";

    async function apiRequest(path, options = {}) {
      const res = await fetch(API_BASE_URL + path, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      let data = null;
      try { data = await res.json(); } catch(e){}
      if(!res.ok) throw new Error(data?.message || "Request failed");
      return data;
    }

    document.getElementById("register-form").addEventListener("submit", async function(e){
      e.preventDefault();
      const form = e.target;
      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const password = form.password.value;
      const role = form.role.value.trim().toUpperCase() || "MEMBER";

      const errorBox = document.getElementById("register-error");
      const successBox = document.getElementById("register-success");
      errorBox.style.display="none";
      successBox.style.display="none";

      try {
        await apiRequest("/api/auth/register", {
          method:"POST",
          body: JSON.stringify({name,email,password,role})
        });

        successBox.innerText = "Registration Successful ✅ Redirecting to login...";
        successBox.style.display="block";
        form.reset();

        setTimeout(() => { window.location.href="login.html"; }, 2000);

      } catch(err) {
        errorBox.innerText = err.message || "Registration failed ❌";
        errorBox.style.display="block";
      }
    });
  </script>
</body>
</html>
